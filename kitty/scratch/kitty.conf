# ===============================
# Scratch terminal config (floating quick-commands terminal)
# ===============================
#
# Launched via KITTY_CONFIG_DIRECTORY=~/.config/kitty/scratch so that kitty's
# OS light/dark *.auto.conf theme-switch files (which live in the parent dir and
# would otherwise override `background`) are NOT auto-discovered here. This dir
# intentionally contains no *.auto.conf, so the background below always sticks.
#
# It inherits the normal kitty setup and a fixed dark palette, then overrides
# just the background. As a result this terminal is always dark and does not
# follow the OS light/dark preference — that is its distinct identity.

include ../kitty.conf
include ../dark-theme.auto.conf

# Distinct dark background for the floating scratch terminal.
background #17251C
